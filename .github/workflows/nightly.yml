name: 🌙 Nightly

on:
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:

permissions:
  contents: read

jobs:
  race:
    name: 🧪 Race Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧪 Race Tests
        run: task test:race

      - name: ⬆️ Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-race-logs
          path: |
            quarry/**/*.log
            sdk/**/*.log
            executor-node/**/*.log
          retention-days: 14

  e2e:
    name: 🔌 E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔌 E2E Tests
        run: task test:e2e
        env:
          QUARRY_NO_SANDBOX: "1"

      - name: ⬆️ Upload E2E Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-logs
          path: |
            quarry/**/*.log
          retention-days: 14
