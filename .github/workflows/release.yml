name: 📦 Release

on:
  push:
    tags: [v*]

permissions:
  contents: write
  packages: write

jobs:
  tag_check:
    name: 🔎 Tag Check
    runs-on: ubuntu-latest
    outputs:
      semver_match: ${{ steps.regex-match.outputs.match }}
    steps:
      - name: 🔎 Match SemVer Tag
        uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        with:
          text: ${{ github.ref_name }}
          regex: ^v[0-9]+\.[0-9]+\.[0-9]+$

  version_lockstep:
    name: 🔒 Version Lockstep
    runs-on: ubuntu-latest
    needs: [tag_check]
    if: ${{ needs.tag_check.outputs.semver_match != '' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔒 Check Version Matches Tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GO_VERSION=$(grep -oP 'const Version = "\K[^"]+' quarry/types/version.go)
          SDK_VERSION=$(jq -r '.version' sdk/package.json)
          echo "Tag version: $TAG_VERSION"
          echo "Go version: $GO_VERSION"
          echo "SDK version: $SDK_VERSION"
          if [ "$GO_VERSION" != "$SDK_VERSION" ]; then
            echo "::error::Version mismatch! quarry/types/version.go ($GO_VERSION) != sdk/package.json ($SDK_VERSION)"
            exit 1
          fi
          if [ "$GO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag mismatch! Tag ($TAG_VERSION) != code version ($GO_VERSION)"
            exit 1
          fi
          echo "✅ All versions match: $TAG_VERSION"

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    needs: [tag_check]
    if: ${{ needs.tag_check.outputs.semver_match != '' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧹 Lint
        run: task lint

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: [tag_check]
    if: ${{ needs.tag_check.outputs.semver_match != '' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧪 Test
        run: task test

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [tag_check]
    if: ${{ needs.tag_check.outputs.semver_match != '' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🏗️ Build
        run: task build

  examples:
    name: 📦 Examples
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 📦 Run Examples
        run: task examples
        env:
          QUARRY_NO_SANDBOX: "1"

  cross-compile:
    name: 🔨 Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [version_lockstep, lint, test, build, examples]
    if: ${{ needs.version_lockstep.result == 'success' }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 📦 Bundle executor
        run: task executor:bundle

      - name: 🔨 Build
        working-directory: quarry
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.commit=$(git rev-parse --short HEAD)" -o quarry ./cmd/quarry

      - name: 📦 Archive
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="quarry_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "dist/${ARCHIVE}" -C quarry quarry
          sha256sum "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"

      - name: ⬆️ Upload
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  package:
    name: 📦 Package
    runs-on: ubuntu-latest
    needs: [cross-compile]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 📦 Package source & SDK
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --output="dist/quarry-${VERSION}.tar.gz" HEAD
          sha256sum "dist/quarry-${VERSION}.tar.gz" > "dist/quarry-${VERSION}.tar.gz.sha256"
          cd sdk
          pnpm pack
          SDK_TARBALL="$(ls -t *.tgz | head -n 1)"
          cd ..
          mv "sdk/${SDK_TARBALL}" "dist/quarry-sdk-${VERSION}.tgz"
          sha256sum "dist/quarry-sdk-${VERSION}.tgz" > "dist/quarry-sdk-${VERSION}.tgz.sha256"

      - name: ⬇️ Download platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: 📋 Generate checksums manifest
        run: |
          cd dist
          sha256sum quarry_*.tar.gz > checksums.txt
          cat checksums.txt

      - name: ⬆️ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/

  hold:
    name: ⏸️ Release Approval
    runs-on: ubuntu-latest
    needs: [package]
    environment:
      name: release
    steps:
      - name: ✅ Await Approval
        run: echo "Release approved; continuing."

  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [hold]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: 🔍 Check for existing release
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BODY=$(gh release view "$TAG" \
            --json body -q '.body' 2>/dev/null || echo "")
          if echo "$BODY" | grep -qv "TODO: Add release notes"; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 📎 Upload assets to existing release
        if: steps.existing.outputs.has_notes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/* --clobber

      - name: 🚀 Create draft release
        if: steps.existing.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          draft: true
          body: |
            <!-- Replace this with the release body per the GitHub release format standard in CLAUDE.md -->
            **TODO: Add release notes before publishing**
          files: dist/*

  publish_ghpr:
    name: 📦 Publish SDK (GitHub Packages)
    runs-on: ubuntu-latest
    needs: [hold]
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          registry-url: https://npm.pkg.github.com
          scope: "@pithecene-io"

      - name: 📦 Setup pnpm via Corepack
        run: |
          EXPECTED_PNPM=$(jq -r '.packageManager' package.json | sed 's/pnpm@\([^+]*\).*/\1/')
          echo "🔧 Preparing pnpm@${EXPECTED_PNPM} via Corepack"
          corepack enable
          corepack prepare "pnpm@${EXPECTED_PNPM}" --activate

      - name: 🔍 Verify Toolchain Pinning
        run: |
          echo "🔧 Node version: $(node --version)"
          ACTUAL_PNPM=$(pnpm --version)
          EXPECTED_PNPM=$(jq -r '.packageManager' package.json | sed 's/pnpm@\([^+]*\).*/\1/')
          echo "🔧 pnpm version (actual): $ACTUAL_PNPM"
          echo "🔧 pnpm version (pinned): $EXPECTED_PNPM"
          if [ "$ACTUAL_PNPM" != "$EXPECTED_PNPM" ]; then
            echo "::error::pnpm version mismatch! Actual ($ACTUAL_PNPM) != Pinned ($EXPECTED_PNPM)"
            exit 1
          fi
          echo "✅ pnpm version matches pin"

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🏗️ Build SDK
        working-directory: sdk
        run: pnpm run build

      - name: 🔍 Publish Diagnostics
        working-directory: sdk
        run: |
          echo "📦 Package: $(jq -r '.name' package.json)"
          echo "📦 Version: $(jq -r '.version' package.json)"
          echo "📦 Registry: $(npm config get registry)"
          echo "📦 Scope registry: $(npm config get @pithecene-io:registry || echo 'not set')"

      - name: 📦 Publish
        working-directory: sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --access restricted --no-git-checks

  publish_jsr:
    name: 📦 Publish SDK (JSR)
    runs-on: ubuntu-latest
    needs: [hold]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 📦 Publish
        working-directory: sdk
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAX_ATTEMPTS=3
          DELAY=10
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "🔄 Attempt $attempt/$MAX_ATTEMPTS"
            if npx jsr publish --set-version "$VERSION"; then
              echo "✅ Published successfully"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "⏳ Retrying in ${DELAY}s..."
              sleep "$DELAY"
              DELAY=$((DELAY * 2))
            fi
          done
          echo "❌ Failed after $MAX_ATTEMPTS attempts"
          exit 1

  container:
    name: 🐳 Container Images
    runs-on: ubuntu-latest
    needs: [hold]
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: 🐳 Build & push (slim)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: slim
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: COMMIT=${{ steps.meta.outputs.commit }}
          tags: |
            ghcr.io/pithecene-io/quarry:${{ steps.meta.outputs.version }}-slim
            ghcr.io/pithecene-io/quarry:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & push (full, amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: full
          push: true
          platforms: linux/amd64
          build-args: COMMIT=${{ steps.meta.outputs.commit }}
          tags: |
            ghcr.io/pithecene-io/quarry:${{ steps.meta.outputs.version }}
            ghcr.io/pithecene-io/quarry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
