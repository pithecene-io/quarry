name: 🤖 CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  version-lockstep:
    name: 🔒 Version Lockstep
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔒 Check Version Lockstep
        run: |
          GO_VERSION=$(grep -oP 'const Version = "\K[^"]+' quarry/types/version.go)
          SDK_VERSION=$(jq -r '.version' sdk/package.json)
          echo "Go version: $GO_VERSION"
          echo "SDK version: $SDK_VERSION"
          if [ "$GO_VERSION" != "$SDK_VERSION" ]; then
            echo "::error::Version mismatch! quarry/types/version.go ($GO_VERSION) != sdk/package.json ($SDK_VERSION)"
            exit 1
          fi
          echo "✅ Versions match: $GO_VERSION"

  cli-parity:
    name: 📋 CLI Parity
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📋 Check CLI Parity
        run: |
          cd quarry
          # Guard: ensure at least one parity test exists (prevents false-pass)
          PARITY_TESTS=$(go test ./cli/cmd -list 'TestCLIParity' 2>/dev/null | grep -c 'TestCLIParity' || true)
          if [ "$PARITY_TESTS" -eq 0 ]; then
            echo "::error::No TestCLIParity* tests found - strict parity gate requires at least one"
            exit 1
          fi
          echo "Found $PARITY_TESTS parity tests"
          go test ./cli/cmd -run Parity -v
          echo "✅ CLI parity artifact is in sync"

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧹 Lint
        run: task lint

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧪 Test
        run: task test

  bundle-freshness:
    name: 📦 Bundle Freshness
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 📦 Regenerate bundle
        run: task executor:bundle

      - name: 🔍 Check for drift
        run: |
          if ! git diff --exit-code quarry/executor/bundle/executor.mjs; then
            echo "::error::Embedded executor bundle is stale. Run 'task executor:bundle' and commit the result."
            exit 1
          fi
          echo "✅ Bundle is fresh"

  sdk-lockstep:
    name: 🔒 SDK Build Lockstep
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🏗️ Build SDK
        run: pnpm -C sdk run build

      - name: 🔍 Verify CONTRACT_VERSION matches source
        run: |
          SOURCE_VERSION=$(grep -oP "export const CONTRACT_VERSION = '\K[^']+" sdk/src/types/events.ts)
          BUILT_VERSION=$(grep -oP 'const CONTRACT_VERSION = "\K[^"]+' sdk/dist/index.mjs)
          echo "Source CONTRACT_VERSION: $SOURCE_VERSION"
          echo "Built CONTRACT_VERSION:  $BUILT_VERSION"
          if [ "$SOURCE_VERSION" != "$BUILT_VERSION" ]; then
            echo "::error::SDK build CONTRACT_VERSION mismatch!" \
              "Source ($SOURCE_VERSION) != Built ($BUILT_VERSION)"
            exit 1
          fi
          echo "✅ SDK build lockstep verified"

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🏗️ Build
        run: task build

  examples:
    name: 📦 Examples
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup
        uses: jdx/mise-action@v2

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 📦 Run Examples
        run: task examples
        env:
          QUARRY_NO_SANDBOX: "1"

      - name: ⬆️ Upload Example Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-run-logs
          path: .example-runs/
          retention-days: 14

  container:
    name: 🐳 Dockerfile Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Validate Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          target: full
          call: check
