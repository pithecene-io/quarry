version: '3'

vars:
  TS_PACKAGES: sdk executor-node
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo unknown

tasks:
  # ====================
  # Top-level (CI-facing)
  # ====================

  build:
    desc: Build all packages (Go + TS)
    # Note: ts:build is transitive via go:build → executor:bundle → ts:build
    deps: [go:build]

  lint:
    desc: Lint all packages (Go + TS + YAML)
    deps: [go:lint, ts:lint]
    cmds:
      - yamllint .

  test:
    desc: Run all tests (Go + TS)
    deps: [go:test, ts:test]

  test:race:
    desc: Run all tests with race detector
    deps: [go:test:race, ts:test]

  test:e2e:
    desc: Run E2E integration tests (requires Node + Chromium)
    deps: [ts:build]
    dir: quarry
    cmds:
      - go test -v -timeout 120s ./runtime/ -e2e

  examples:
    desc: Run and validate all examples
    # Note: ts:build is transitive via go:build → executor:bundle → ts:build
    deps: [go:build]
    cmds:
      - pnpm exec tsx scripts/run-examples.ts

  examples:check:
    desc: Validate example files exist (fast check)
    cmds:
      - test -f examples/demo.ts
      - test -f examples/static-html-list/script.ts
      - test -f examples/toy-pagination/script.ts
      - test -f examples/artifact-snapshot/script.ts
      - test -f examples/intentional-failure/script.ts
      - test -f examples/manifest.json

  typecheck:
    desc: Typecheck implementation (TS)
    deps: [ts:typecheck]

  types:
    desc: Typecheck public API contracts (TS)
    deps: [ts:types]

  format:
    desc: Format all packages (Go + TS)
    aliases: [fmt]
    deps: [go:format, ts:format]

  version:lockstep:
    desc: Verify version lockstep (Go == SDK)
    cmds:
      - |
        GO_VERSION=$(grep -oP 'const Version = "\K[^"]+' quarry/types/version.go)
        SDK_VERSION=$(jq -r '.version' sdk/package.json)
        echo "Go version:  $GO_VERSION"
        echo "SDK version: $SDK_VERSION"
        if [ "$GO_VERSION" != "$SDK_VERSION" ]; then
          echo "❌ Version mismatch!"
          exit 1
        fi
        echo "✅ Versions match"

  version:bump:
    desc: Bump lockstep version across all components
    summary: |
      Usage: task version:bump V=X.Y.Z

      Updates every lockstep version target, rebuilds SDK and executor
      bundle, and verifies the result. Does NOT commit or edit CHANGELOG.

      Targets updated:
        - quarry/types/version.go          (canonical)
        - sdk/package.json                 (npm)
        - sdk/src/types/events.ts          (CONTRACT_VERSION)
        - sdk/test/emit/06-golden/*.json   (golden fixtures)
        - quarry/adapter/redisstream/*_test.go (Go test fixtures)
        - docs/CLI_PARITY.json             (parity artifact)
        - docs/guides/container.md         (image tags)
        - README.md, PUBLIC_API.md, SUPPORT.md, docs/IMPLEMENTATION_PLAN.md

      After running, you still need to:
        1. Update CHANGELOG.md (promote Unreleased → dated section)
        2. Commit as a single version bump
    requires:
      vars: [V]
    cmds:
      - |
        set -euo pipefail
        NEW="{{.V}}"
        OLD=$(grep -oP 'const Version = "\K[^"]+' quarry/types/version.go)
        echo "🔖 Bumping $OLD → $NEW"
        echo ""

        # 1. Go canonical version
        sed -i "s/const Version = \"${OLD}\"/const Version = \"${NEW}\"/" \
          quarry/types/version.go
        echo "  ✅ quarry/types/version.go"

        # 2. SDK package.json
        sed -i "s/\"version\": \"${OLD}\"/\"version\": \"${NEW}\"/" sdk/package.json
        echo "  ✅ sdk/package.json"

        # 3. CONTRACT_VERSION in events.ts
        sed -i "s/export const CONTRACT_VERSION = '${OLD}'/export const CONTRACT_VERSION = '${NEW}'/" \
          sdk/src/types/events.ts
        echo "  ✅ sdk/src/types/events.ts"

        # 4. Golden test fixtures
        for f in sdk/test/emit/06-golden/*.json; do
          sed -i "s/\"contract_version\": \"${OLD}\"/\"contract_version\": \"${NEW}\"/g" "$f"
          echo "  ✅ $f"
        done

        # 5. Go test fixtures (redisstream)
        for f in quarry/adapter/redisstream/*_test.go; do
          sed -i "s/ContractVersion: \"${OLD}\"/ContractVersion: \"${NEW}\"/g" "$f"
          echo "  ✅ $f"
        done

        # 6. CLI parity artifact
        sed -i "s/\"version\": \"${OLD}\"/\"version\": \"${NEW}\"/" docs/CLI_PARITY.json
        echo "  ✅ docs/CLI_PARITY.json"

        # 7. Container guide image tags
        sed -i "s/quarry:${OLD}/quarry:${NEW}/g" docs/guides/container.md
        sed -i "s/quarry:${OLD}-slim/quarry:${NEW}-slim/g" docs/guides/container.md
        echo "  ✅ docs/guides/container.md"

        # 8. Public-facing docs (install commands, image tags, version refs)
        for f in README.md PUBLIC_API.md SUPPORT.md docs/IMPLEMENTATION_PLAN.md; do
          sed -i "s/${OLD}/${NEW}/g" "$f"
          echo "  ✅ $f"
        done

        echo ""
        echo "🏗️  Rebuilding SDK and executor bundle..."
      - task: ts:build
      - task: executor:bundle
      - task: version:lockstep
      - |
        echo ""
        echo "✅ All lockstep targets updated to {{.V}}"
        echo ""
        echo "Remaining manual steps:"
        echo "  1. Update CHANGELOG.md (promote [Unreleased] → [{{.V}}])"
        echo "  2. Commit as a single version bump"

  # ==========
  # Go tasks
  # ==========

  go:build:
    desc: Build Go module
    aliases: [go:b]
    deps: [executor:bundle]
    dir: quarry
    cmds:
      - go build -ldflags "-X main.commit={{.COMMIT}}" -o quarry ./cmd/quarry

  executor:bundle:
    desc: Bundle executor for embedding
    deps: [ts:build]
    cmds:
      - pnpm -C executor-node run bundle

  go:cross:
    desc: Cross-compile quarry for all platforms
    deps: [executor:bundle]
    dir: quarry
    cmds:
      - |
        mkdir -p dist
        for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
          GOOS="${pair%/*}" GOARCH="${pair#*/}" CGO_ENABLED=0 \
            go build -ldflags "-X main.commit={{.COMMIT}}" -o "dist/quarry_${GOOS}_${GOARCH}" ./cmd/quarry
          echo "✅ ${pair}"
        done

  go:lint:
    desc: Lint Go module
    aliases: [go:l]
    dir: quarry
    cmds:
      - golangci-lint run ./...

  go:test:
    desc: Test Go module
    aliases: [go:t]
    dir: quarry
    cmds:
      - go test ./...

  cli:parity:
    desc: Validate CLI/config parity artifact
    dir: quarry
    cmds:
      - go test ./cli/cmd -run Parity -v

  go:test:race:
    desc: Test Go module with race detector
    aliases: [go:tr]
    dir: quarry
    cmds:
      - go test -v -race ./...

  go:format:
    desc: Format Go module
    aliases: [go:fmt]
    dir: quarry
    cmds:
      - golangci-lint run --fix ./...

  # ==================
  # Docker tasks
  # ==================

  docker:build:
    desc: Build container image with commit SHA
    cmds:
      - docker build --build-arg COMMIT={{.COMMIT}} -t quarry:local .

  # ==================
  # TypeScript tasks
  # ==================

  ts:build:
    desc: Build all TS packages
    aliases: [ts:b]
    cmds:
      - for: { var: TS_PACKAGES }
        cmd: pnpm -C {{.ITEM}} run build

  ts:lint:
    desc: Lint all TS packages
    aliases: [ts:l]
    cmds:
      - for: { var: TS_PACKAGES }
        cmd: pnpm -C {{.ITEM}} run lint

  ts:test:
    desc: Run runtime tests (Vitest) for all TS packages
    aliases: [ts:t]
    deps: [ts:build]
    cmds:
      - for: { var: TS_PACKAGES }
        cmd: pnpm -C {{.ITEM}} run test

  ts:typecheck:
    desc: Typecheck TS implementation (tsc --noEmit)
    aliases: [ts:tc]
    cmds:
      - for: { var: TS_PACKAGES }
        cmd: pnpm -C {{.ITEM}} run typecheck

  ts:types:
    desc: Validate public TS API contracts (tsd)
    aliases: [ts:d]
    cmds:
      - pnpm -C sdk run test:types

  ts:format:
    desc: Format all TS packages
    aliases: [ts:fmt]
    cmds:
      - for: { var: TS_PACKAGES }
        cmd: pnpm -C {{.ITEM}} run format
